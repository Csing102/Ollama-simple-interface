<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stable-Code:3b Interface</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: #121212; color: #e0e0e0; }
        textarea { width: 100%; height: 120px; background: #1e1e1e; color: #fff; border: 1px solid #333; padding: 0.5rem; border-radius: 6px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 0.6rem 1.2rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 0.5rem; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        pre { background: #1e1e1e; padding: 1rem; border-radius: 6px; overflow-x: auto; min-height: 100px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Stable-Code 3B Generator</h2>
    <p>Prompt your local model to write code:</p>
    
    <textarea id="prompt" placeholder="Write a JavaScript function to reverse a string..."></textarea>
    <br>
    <button id="generateBtn" onclick="generateCode()">Generate Code</button>

    <h3>Output:</h3>
    <pre id="output">Result will appear here...</pre>

    <script>
        async function generateCode() {
            const prompt = document.getElementById("prompt").value;
            const outputEl = document.getElementById("output");
            const btn = document.getElementById("generateBtn");

            if (!prompt.trim()) return;

            btn.disabled = true;
            outputEl.textContent = "Thinking...";

            try {
                // Direct call to local Ollama API
                const response = await fetch("http://localhost:11434/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "stable-code:3b",
                        prompt: prompt,
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                outputEl.textContent = data.response;
            } catch (err) {
                outputEl.textContent = "Error: " + err.message + 
                    "\n\nIf you see a fetch error, make sure Ollama is running with OLLAMA_ORIGINS=\"*\" set!";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
