<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stable-Code:3B Interface</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 90%;
      max-width: 850px;
      height: 85vh;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }
    .header {
      padding: 16px;
      background: #334155;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      max-width: 85%;
      white-space: pre-wrap;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .user {
      align-self: flex-end;
      background: #2563eb;
      color: #ffffff;
    }
    .bot {
      align-self: flex-start;
      background: #334155;
      color: #f8fafc;
    }
    .input-area {
      display: flex;
      padding: 16px;
      gap: 10px;
      background: #0f172a;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
    }
    textarea {
      flex: 1;
      resize: none;
      height: 60px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #1e293b;
      color: #fff;
      font-size: 1rem;
    }
    textarea:focus { outline: 1px solid #2563eb; }
    button {
      padding: 0 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="header">Stable-Code:3B Chat</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="prompt" placeholder="Ask for code (e.g., Write a quicksort function in Python)..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // Automatically uses local proxy path if served via server, or absolute URL if opened as a file
    const ENDPOINT = window.location.protocol.startsWith('http') 
      ? '/api/generate' 
      : 'http://localhost:11434/api/generate';

    async function sendMessage() {
      const promptInput = document.getElementById('prompt');
      const sendBtn = document.getElementById('sendBtn');
      const prompt = promptInput.value.trim();

      if (!prompt) return;

      appendMessage(prompt, 'user');
      promptInput.value = '';
      sendBtn.disabled = true;

      const botMessageDiv = appendMessage('Generating response...', 'bot');

      try {
        const response = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'stable-code:3b',
            prompt: prompt,
            stream: false // Disabled streaming to guarantee complete payload arrival without CORS/chunk errors
          })
        });

        if (!response.ok) {
          throw new Error(`Server returned HTTP ${response.status}`);
        }

        const data = await response.json();
        botMessageDiv.textContent = data.response;

      } catch (err) {
        botMessageDiv.textContent = `Error: ${err.message}\n\nCheck that Ollama or your Python/Node server is currently running.`;
      } finally {
        sendBtn.disabled = false;
      }
    }

    function appendMessage(text, className) {
      const messagesContainer = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${className}`;
      msgDiv.textContent = text;
      messagesContainer.appendChild(msgDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      return msgDiv;
    }
  </script>
</body>
</html>
